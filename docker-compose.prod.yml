services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    ports:
      - '4000:4000'
      - '5555:5555'
    volumes:
      - ./server/prisma:/app/prisma
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:4000/health || exit 1']
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - restaurant-network
    environment:
      - NODE_ENV=production

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_ENDPOINT: http://server:4000
        NEXT_PUBLIC_URL: http://<your-azure-url>:3000
        DOCKER_PUBLIC_API_ENDPOINT: http://server:4000
    env_file:
      - ./client/.env
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next
    command: npm run start
    depends_on:
      server:
        condition: service_healthy
    networks:
      - restaurant-network
    environment:
      - NODE_ENV=production

networks:
  restaurant-network:
    driver: bridge

volumes:
  postgres_data:
