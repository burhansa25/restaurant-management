name: Build and Deploy to Azure

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

env:
  REGISTRY_LOGIN_SERVER: <your-registry>.azurecr.io
  REGISTRY_USERNAME: <your-registry-username>
  IMAGE_NAME_CLIENT: restaurant-client
  IMAGE_NAME_SERVER: restaurant-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Login to Azure Container Registry
      uses: azure/docker-login@v1
      with:
        login-server: ${{ env.REGISTRY_LOGIN_SERVER }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Build and push client image
      run: |
        docker build -f client/Dockerfile \
          --build-arg NEXT_PUBLIC_API_ENDPOINT=${{ secrets.API_ENDPOINT }} \
          --build-arg NEXT_PUBLIC_URL=${{ secrets.CLIENT_URL }} \
          --build-arg DOCKER_PUBLIC_API_ENDPOINT=http://server:4000 \
          -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_CLIENT }}:latest \
          -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_CLIENT }}:${{ github.sha }} \
          client/

    - name: Build and push server image
      run: |
        docker build -f server/Dockerfile \
          -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_SERVER }}:latest \
          -t ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.sha }} \
          server/

    - name: Push images
      run: |
        docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_CLIENT }}:latest
        docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_CLIENT }}:${{ github.sha }}
        docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_SERVER }}:latest
        docker push ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_SERVER }}:${{ github.sha }}

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v3

    - name: Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure Container Instances
      run: |
        az container create \
          --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
          --name restaurant-app \
          --image ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME_SERVER }}:latest \
          --registry-login-server ${{ env.REGISTRY_LOGIN_SERVER }} \
          --registry-username ${{ secrets.REGISTRY_USERNAME }} \
          --registry-password ${{ secrets.REGISTRY_PASSWORD }} \
          --environment-variables \
            DATABASE_URL="file:./dev.db" \
            PORT="4000" \
          --ports 4000 \
          --cpu 1 --memory 1
