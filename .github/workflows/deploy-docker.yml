name: Deploy Restaurant Management with Docker

on:
  push:
    branches:
      - playout # Keeping it on playout for your testing safety loop
  workflow_dispatch:

jobs:
  deploy-server:
    name: Build and Push Backend Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          # Passes your database URL context down into the Prisma builder stage securely
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          tags: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.SERVER_IMAGE }}:latest

      - name: Deploy Backend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.SERVER_APP_NAME }}
          publish-profile: ${{ secrets.SERVER_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.SERVER_IMAGE }}:latest

  deploy-client:
    name: Build and Push Frontend Container
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          # Feeds your specific Next environment variables seamlessly into your custom Docker builder multi-stage
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ secrets.NEXT_PUBLIC_API_ENDPOINT }}
            NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
          tags: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.CLIENT_IMAGE }}:latest

      - name: Deploy Frontend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.CLIENT_APP_NAME }}
          publish-profile: ${{ secrets.CLIENT_PUBLISH_PROFILE }}
          images: ${{ secrets.REGISTRY }}/${{ secrets.CLIENT_IMAGE }}:latest
    notify-discord:
    name: Notify Discord
    runs-on: ubuntu-latest
    needs:
      - deploy-server
      - deploy-client
    if: always()

    steps:
      - name: Send deployment result to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          SERVER_STATUS: ${{ needs.deploy-server.result }}
          CLIENT_STATUS: ${{ needs.deploy-client.result }}
        run: |
          if [ "$BRANCH_NAME" = "main" ]; then
            ENVIRONMENT="PRODUCTION"
          else
            ENVIRONMENT="STAGING"
          fi

          if [ "$SERVER_STATUS" = "success" ] && [ "$CLIENT_STATUS" = "success" ]; then
            STATUS="✅ Deployment Success"
          else
            STATUS="❌ Deployment Failed"
          fi

          payload=$(jq -n \
            --arg status "$STATUS" \
            --arg environment "$ENVIRONMENT" \
            --arg repo "$REPO_NAME" \
            --arg branch "$BRANCH_NAME" \
            --arg message "$COMMIT_MESSAGE" \
            --arg url "$COMMIT_URL" \
            --arg server "$SERVER_STATUS" \
            --arg client "$CLIENT_STATUS" \
            '{
              username: "Azure CI/CD",
              embeds: [
                {
                  title: $status,
                  description: ("Environment: **" + $environment + "**\nRepository: **" + $repo + "**\nBranch: **" + $branch + "**"),
                  fields: [
                    {
                      name: "Server Deploy",
                      value: $server,
                      inline: true
                    },
                    {
                      name: "Client Deploy",
                      value: $client,
                      inline: true
                    },
                    {
                      name: "Commit Message",
                      value: $message,
                      inline: false
                    },
                    {
                      name: "Commit Link",
                      value: $url,
                      inline: false
                    }
                  ]
                }
              ]
            }')

          curl -H "Content-Type: application/json" \
               -d "$payload" \
               "$DISCORD_WEBHOOK_URL"
