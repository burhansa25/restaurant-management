name: Deploy Restaurant Management Infrastructure

concurrency:
  group: restaurant-management-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - playout
  workflow_dispatch:

jobs:
  continuous-integration:
    name: Continuous Integration
    runs-on: ubuntu-latest

    env:
      IMAGE_TAG: ${{ github.ref_name }}-${{ github.sha }}
      AZURE_REGISTRY: ${{ secrets.AZURE_REGISTRY }}

      SERVER_IMAGE: ${{ secrets.SERVER_IMAGE }}
      CLIENT_IMAGE: ${{ secrets.CLIENT_IMAGE }}

      DATABASE_URL: ${{ github.ref_name == 'playout' && secrets.DATABASE_URL || secrets.STAGING_DATABASE_URL }}

      NEXT_PUBLIC_API_ENDPOINT: ${{ github.ref_name == 'playout' && secrets.NEXT_PUBLIC_API_ENDPOINT || secrets.STAGING_NEXT_PUBLIC_API_ENDPOINT }}
      NEXT_PUBLIC_URL: ${{ github.ref_name == 'playout' && secrets.NEXT_PUBLIC_URL || secrets.STAGING_NEXT_PUBLIC_URL }}
      DOCKER_PUBLIC_API_ENDPOINT: ${{ github.ref_name == 'playout' && secrets.NEXT_PUBLIC_API_ENDPOINT || secrets.STAGING_NEXT_PUBLIC_API_ENDPOINT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Server Dependencies
        working-directory: ./server
        run: npm ci

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Prisma Validate
        run: |
          cd server
          npx prisma validate

      - name: TypeScript Check
        run: |
          cd server
          npx tsc --noEmit

      - name: Lint Server
        working-directory: ./server
        run: npm run lint

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Build Server
        working-directory: ./server
        run: npm run build

      - name: Build Client
        working-directory: ./client
        run: npm run build

      - name: Validate backend Docker build
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: false
          build-args: |
            DATABASE_URL=${{ env.DATABASE_URL }}
          tags: |
            ${{ env.AZURE_REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Validate frontend Docker build
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: false
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ env.NEXT_PUBLIC_API_ENDPOINT }}
            NEXT_PUBLIC_URL=${{ env.NEXT_PUBLIC_URL }}
            DOCKER_PUBLIC_API_ENDPOINT=${{ env.DOCKER_PUBLIC_API_ENDPOINT }}
          tags: |
            ${{ env.AZURE_REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Test status
        run: echo "Test planned, but not active yet."

  continuous-deployment:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: continuous-integration

    env:
      IMAGE_TAG: ${{ github.ref_name }}-${{ github.sha }}

      AZURE_REGISTRY: ${{ secrets.AZURE_REGISTRY }}
      REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
      REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}

      SERVER_IMAGE: ${{ secrets.SERVER_IMAGE }}
      CLIENT_IMAGE: ${{ secrets.CLIENT_IMAGE }}

      DATABASE_URL: ${{ github.ref_name == 'playout' && secrets.DATABASE_URL || secrets.STAGING_DATABASE_URL }}

      NEXT_PUBLIC_API_ENDPOINT: ${{ github.ref_name == 'playout' && secrets.NEXT_PUBLIC_API_ENDPOINT || secrets.STAGING_NEXT_PUBLIC_API_ENDPOINT }}
      NEXT_PUBLIC_URL: ${{ github.ref_name == 'playout' && secrets.NEXT_PUBLIC_URL || secrets.STAGING_NEXT_PUBLIC_URL }}
      DOCKER_PUBLIC_API_ENDPOINT: ${{ github.ref_name == 'playout' && secrets.NEXT_PUBLIC_API_ENDPOINT || secrets.STAGING_NEXT_PUBLIC_API_ENDPOINT }}

      SERVER_APP_NAME: ${{ github.ref_name == 'playout' && secrets.SERVER_APP_NAME || secrets.STAGING_SERVER_APP_NAME }}
      CLIENT_APP_NAME: ${{ github.ref_name == 'playout' && secrets.CLIENT_APP_NAME || secrets.STAGING_CLIENT_APP_NAME }}

      SERVER_PUBLISH_PROFILE: ${{ github.ref_name == 'playout' && secrets.SERVER_PUBLISH_PROFILE || secrets.STAGING_SERVER_PUBLISH_PROFILE }}
      CLIENT_PUBLISH_PROFILE: ${{ github.ref_name == 'playout' && secrets.CLIENT_PUBLISH_PROFILE || secrets.STAGING_CLIENT_PUBLISH_PROFILE }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.AZURE_REGISTRY }}
          username: ${{ env.REGISTRY_USERNAME }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server

          cache-from: type=gha
          cache-to: type=gha,mode=max

          push: true
          build-args: |
            DATABASE_URL=${{ env.DATABASE_URL }}
          tags: |
            ${{ env.AZURE_REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./client

          cache-from: type=gha
          cache-to: type=gha,mode=max

          push: true
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ env.NEXT_PUBLIC_API_ENDPOINT }}
            NEXT_PUBLIC_URL=${{ env.NEXT_PUBLIC_URL }}
            DOCKER_PUBLIC_API_ENDPOINT=${{ env.DOCKER_PUBLIC_API_ENDPOINT }}
          tags: |
            ${{ env.AZURE_REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy backend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.SERVER_APP_NAME }}
          publish-profile: ${{ env.SERVER_PUBLISH_PROFILE }}
          images: ${{ env.AZURE_REGISTRY }}/${{ env.SERVER_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy frontend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.CLIENT_APP_NAME }}
          publish-profile: ${{ env.CLIENT_PUBLISH_PROFILE }}
          images: ${{ env.AZURE_REGISTRY }}/${{ env.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Wait for deployment
        run: sleep 60

      - name: Health Check Backend
        run: |
          curl -f https://${{ env.SERVER_APP_NAME }}.azurewebsites.net/health

      - name: Health Check Frontend
        run: |
          curl -f https://${{ env.CLIENT_APP_NAME }}.azurewebsites.net
          
          
  notify-discord:
    name: Notify Discord Deployment Success
    runs-on: ubuntu-latest
    needs: continuous-deployment
    if: ${{ needs.continuous-deployment.result == 'success' }}

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BRANCH_NAME: ${{ github.ref_name }}
      REPO_NAME: ${{ github.repository }}
      COMMIT_SHA: ${{ github.sha }}
      COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual workflow dispatch' }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      IMAGE_TAG: ${{ github.ref_name }}-${{ github.sha }}

    steps:
      - name: Send success notification to Discord
        run: |
          if [ "$BRANCH_NAME" = "playout" ]; then
            ENVIRONMENT="PRODUCTION"
          else
            ENVIRONMENT="STAGING"
          fi

          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          payload=$(jq -n \
            --arg title "✅ Deployment Success" \
            --arg environment "$ENVIRONMENT" \
            --arg repo "$REPO_NAME" \
            --arg branch "$BRANCH_NAME" \
            --arg commit "$SHORT_SHA" \
            --arg image_tag "$IMAGE_TAG" \
            --arg message "$COMMIT_MESSAGE" \
            --arg run_url "$RUN_URL" \
            '{
              username: "GitHub Actions",
              content: "✅ Deployment berhasil!",
              embeds: [
                {
                  title: $title,
                  color: 3066993,
                  fields: [
                    {
                      name: "Environment",
                      value: $environment,
                      inline: true
                    },
                    {
                      name: "Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "Repository",
                      value: $repo,
                      inline: false
                    },
                    {
                      name: "Commit",
                      value: $commit,
                      inline: true
                    },
                    {
                      name: "Image Tag",
                      value: $image_tag,
                      inline: false
                    },
                    {
                      name: "Commit Message",
                      value: $message,
                      inline: false
                    },
                    {
                      name: "Workflow Run",
                      value: $run_url,
                      inline: false
                    }
                  ]
                }
              ]
            }')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"

  notify-discord-failed:
    name: Notify Discord Deployment Failed
    runs-on: ubuntu-latest

    needs:
      - continuous-integration
      - continuous-deployment

    if: ${{ always() && (needs.continuous-integration.result == 'failure' || needs.continuous-deployment.result == 'failure') }}

    env:
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      BRANCH_NAME: ${{ github.ref_name }}
      REPO_NAME: ${{ github.repository }}
      COMMIT_SHA: ${{ github.sha }}
      COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual workflow dispatch' }}
      RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      - name: Send Failed Notification
        run: |
          if [ "$BRANCH_NAME" = "playout" ]; then
            ENVIRONMENT="PRODUCTION"
          else
            ENVIRONMENT="STAGING"
          fi

          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          payload=$(jq -n \
            --arg title "❌ Deployment Failed" \
            --arg environment "$ENVIRONMENT" \
            --arg repo "$REPO_NAME" \
            --arg branch "$BRANCH_NAME" \
            --arg commit "$SHORT_SHA" \
            --arg message "$COMMIT_MESSAGE" \
            --arg run_url "$RUN_URL" \
            '{
              username: "GitHub Actions",
              content: "❌ Deployment gagal!",
              embeds: [
                {
                  title: $title,
                  color: 15158332,
                  fields: [
                    {
                      name: "Environment",
                      value: $environment,
                      inline: true
                    },
                    {
                      name: "Branch",
                      value: $branch,
                      inline: true
                    },
                    {
                      name: "Repository",
                      value: $repo,
                      inline: false
                    },
                    {
                      name: "Commit",
                      value: $commit,
                      inline: true
                    },
                    {
                      name: "Commit Message",
                      value: $message,
                      inline: false
                    },
                    {
                      name: "Workflow Run",
                      value: $run_url,
                      inline: false
                    }
                  ]
                }
              ]
            }')

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$DISCORD_WEBHOOK_URL"