name: Deploy Restaurant Management with Docker

on:
  push:
    branches:
      - playout # Keeping it on playout for your testing safety loop

env:
  REGISTRY: acrburhan053118362.azurecr.io
  SERVER_APP_NAME: restaurant-server-053118362
  CLIENT_APP_NAME: restaurant-client-053118362
  SERVER_IMAGE: restaurant-server
  CLIENT_IMAGE: restaurant-client

jobs:
  deploy-server:
    name: Build and Push Backend Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          # Passes your database URL context down into the Prisma builder stage securely
          build-args: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
          tags: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest

      - name: Deploy Backend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.SERVER_APP_NAME }}
          publish-profile: ${{ secrets.SERVER_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.SERVER_IMAGE }}:latest

  deploy-client:
    name: Build and Push Frontend Container
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          # Feeds your specific Next environment variables seamlessly into your custom Docker builder multi-stage
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ secrets.NEXT_PUBLIC_API_ENDPOINT }}
            NEXT_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}
          tags: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE }}:latest

      - name: Deploy Frontend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.CLIENT_APP_NAME }}
          publish-profile: ${{ secrets.CLIENT_PUBLISH_PROFILE }}
          images: ${{ env.REGISTRY }}/${{ env.CLIENT_IMAGE }}:latest
