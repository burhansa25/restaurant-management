name: Deployment

on:
  push:
    branches:
      - main
      - playout
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Push, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment variables
        run: |
          if [ "${{ github.ref_name }}" = "playout" ]; then
            echo "IMAGE_TAG=latest" >> $GITHUB_ENV

            echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV

            echo "API_ENDPOINT=${{ secrets.NEXT_PUBLIC_API_ENDPOINT }}" >> $GITHUB_ENV
            echo "PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}" >> $GITHUB_ENV

            echo "SERVER_APP_NAME=${{ secrets.SERVER_APP_NAME }}" >> $GITHUB_ENV
            echo "CLIENT_APP_NAME=${{ secrets.CLIENT_APP_NAME }}" >> $GITHUB_ENV

            echo "SERVER_PUBLISH_PROFILE<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.SERVER_PUBLISH_PROFILE }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV

            echo "CLIENT_PUBLISH_PROFILE<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.CLIENT_PUBLISH_PROFILE }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "IMAGE_TAG=staging" >> $GITHUB_ENV

            echo "DATABASE_URL=${{ secrets.STAGING_DATABASE_URL }}" >> $GITHUB_ENV

            echo "API_ENDPOINT=${{ secrets.STAGING_NEXT_PUBLIC_API_ENDPOINT }}" >> $GITHUB_ENV
            echo "PUBLIC_URL=${{ secrets.STAGING_NEXT_PUBLIC_URL }}" >> $GITHUB_ENV

            echo "SERVER_APP_NAME=${{ secrets.STAGING_SERVER_APP_NAME }}" >> $GITHUB_ENV
            echo "CLIENT_APP_NAME=${{ secrets.STAGING_CLIENT_APP_NAME }}" >> $GITHUB_ENV

            echo "SERVER_PUBLISH_PROFILE<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.STAGING_SERVER_PUBLISH_PROFILE }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV

            echo "CLIENT_PUBLISH_PROFILE<<EOF" >> $GITHUB_ENV
            echo "${{ secrets.STAGING_CLIENT_PUBLISH_PROFILE }}" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          build-args: |
            DATABASE_URL=${{ env.DATABASE_URL }}
          tags: |
            ${{ secrets.AZURE_REGISTRY }}/${{ secrets.SERVER_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy Backend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.SERVER_APP_NAME }}
          publish-profile: ${{ env.SERVER_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.SERVER_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ env.API_ENDPOINT }}
            NEXT_PUBLIC_URL=${{ env.PUBLIC_URL }}
            DOCKER_PUBLIC_API_ENDPOINT=${{ env.API_ENDPOINT }}
          tags: |
            ${{ secrets.AZURE_REGISTRY }}/${{ secrets.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}

      - name: Deploy Frontend to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.CLIENT_APP_NAME }}
          publish-profile: ${{ env.CLIENT_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.CLIENT_IMAGE }}:${{ env.IMAGE_TAG }}
