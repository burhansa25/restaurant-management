name: Deploy Restaurant Management Infrastructure (Flipped Pipeline)

on:
  push:
    branches:
      - main     
      - playout  
  workflow_dispatch:

jobs:
  deploy-server:
    name: Build and Push Backend Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Dynamic Database URL
        run: |
          if [ "${{ github.ref_name }}" = "playout" ]; then
            echo "RESOLVED_DB_URL=${{ secrets.DATABASE_URL }}" >> $GITHUB_ENV
          else
            echo "RESOLVED_DB_URL=${{ secrets.STAGING_DATABASE_URL }}" >> $GITHUB_ENV
          fi

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Server Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          build-args: |
            DATABASE_URL=${{ env.RESOLVED_DB_URL }}
          tags: |
            ${{ secrets.AZURE_REGISTRY }}/${{ secrets.SERVER_IMAGE }}:${{ github.ref_name == 'playout' && 'latest' || 'staging' }}

      - name: Deploy Backend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.ref_name == 'playout' && secrets.SERVER_APP_NAME || secrets.STAGING_SERVER_APP_NAME }}
          publish-profile: ${{ github.ref_name == 'playout' && secrets.SERVER_PUBLISH_PROFILE || secrets.STAGING_SERVER_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.SERVER_IMAGE }}:${{ github.ref_name == 'playout' && 'latest' || 'staging' }}

  deploy-client:
    name: Build and Push Frontend Container
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set Dynamic Frontend Endpoints
        run: |
          if [ "${{ github.ref_name }}" = "playout" ]; then
            echo "RESOLVED_API_ENDPOINT=${{ secrets.NEXT_PUBLIC_API_ENDPOINT }}" >> $GITHUB_ENV
            echo "RESOLVED_PUBLIC_URL=${{ secrets.NEXT_PUBLIC_URL }}" >> $GITHUB_ENV
          else
            echo "RESOLVED_API_ENDPOINT=${{ secrets.STAGING_NEXT_PUBLIC_API_ENDPOINT }}" >> $GITHUB_ENV
            echo "RESOLVED_PUBLIC_URL=${{ secrets.STAGING_NEXT_PUBLIC_URL }}" >> $GITHUB_ENV
          fi

      - name: Log into Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push Client Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          build-args: |
            NEXT_PUBLIC_API_ENDPOINT=${{ env.RESOLVED_API_ENDPOINT }}
            NEXT_PUBLIC_URL=${{ env.RESOLVED_PUBLIC_URL }}
            DOCKER_PUBLIC_API_ENDPOINT=${{ env.RESOLVED_API_ENDPOINT }}
          tags: |
            ${{ secrets.AZURE_REGISTRY }}/${{ secrets.CLIENT_IMAGE }}:${{ github.ref_name == 'playout' && 'latest' || 'staging' }}

      - name: Deploy Frontend to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ github.ref_name == 'playout' && secrets.CLIENT_APP_NAME || secrets.STAGING_CLIENT_APP_NAME }}
          publish-profile: ${{ github.ref_name == 'playout' && secrets.CLIENT_PUBLISH_PROFILE || secrets.STAGING_CLIENT_PUBLISH_PROFILE }}
          images: ${{ secrets.AZURE_REGISTRY }}/${{ secrets.CLIENT_IMAGE }}:${{ github.ref_name == 'playout' && 'latest' || 'staging' }}
