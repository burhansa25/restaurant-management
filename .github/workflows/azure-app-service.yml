name: Deploy Restaurant Management to Azure App Service

on:
  push:
    branches:
      - main
      ## - playout
  workflow_dispatch:

env:
  NODE_VERSION: 20.x
  SERVER_APP_NAME: restaurant-server-053118362
  CLIENT_APP_NAME: restaurant-client-053118362

jobs:
  deploy-server:
    name: Build and Deploy Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Generate Prisma Client
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      - name: Run Prisma migration
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma db push

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.SERVER_APP_NAME }}
          publish-profile: ${{ secrets.SERVER_PUBLISH_PROFILE }}
          package: server

  deploy-client:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          NEXT_PUBLIC_API_ENDPOINT: ${{ secrets.NEXT_PUBLIC_API_ENDPOINT }}
          NEXT_PUBLIC_URL: ${{ secrets.NEXT_PUBLIC_URL }}
        run: npm run build

      - name: Deploy frontend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.CLIENT_APP_NAME }}
          publish-profile: ${{ secrets.CLIENT_PUBLISH_PROFILE }}
          package: client
